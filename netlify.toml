# Color Companion now lives at color.megan-warren.com (Cloudflare Pages). This
# repo's old Netlify site (color-companion-warren.netlify.app) forwards here
# so any old bookmark or shared link still lands in the right place.
[[redirects]]
  from = "/*"
  to = "https://color.megan-warren.com/:splat"
  status = 301
  force = true
