<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Space Grotesk', sans-serif; background: #100f0e; }
  #root { height: 100vh; width: 100vw; }

  /* ───── motion system ───── */
  @keyframes ccDotBloom { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
  @keyframes ccSpin { to { transform: rotate(360deg); } }
  @keyframes ccSpinRev { to { transform: rotate(-360deg); } }
  @keyframes ccFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes ccPop { 0% { transform: scale(.82); } 58% { transform: scale(1.05); } 100% { transform: scale(1); } }

  .cc-wheel-spin { transform-origin: 50% 50%; animation: ccSpin 150s linear infinite; animation-delay: 1.4s; }
  .cc-stage:hover .cc-wheel-spin { animation-play-state: paused; }
  .cc-bloom .cc-dot { animation: ccDotBloom .55s cubic-bezier(.2,.8,.3,1) backwards; }
  .cc-dot { transform-box: fill-box; transform-origin: center; cursor: pointer;
            transition: transform .26s cubic-bezier(.2,.8,.3,1); }
  .cc-dot:hover { transform: scale(2.1); }

  .cc-ct-orbit { transform-origin: 50% 50%; animation: ccSpin 200s linear infinite; animation-delay: 1.2s; }
  .cc-ct-counter { transform-origin: 50% 50%; animation: ccSpinRev 200s linear infinite; animation-delay: 1.2s; }
  .cc-ct-orbit:hover, .cc-ct-orbit:hover .cc-ct-counter { animation-play-state: paused; }

  .cc-fadeup { animation: ccFadeUp .5s cubic-bezier(.2,.8,.3,1) backwards; }
  .cc-pop { animation: ccPop .42s cubic-bezier(.2,.8,.3,1); }

  @media (prefers-reduced-motion: reduce) {
    .cc-wheel-spin, .cc-bloom .cc-dot, .cc-fadeup, .cc-pop,
    .cc-ct-orbit, .cc-ct-counter { animation: none !important; }
  }

  /* ───── responsive: phone + tablet-portrait ─────
     This dashboard was built desktop-first (a permanent sidebar rail, plus a
     few "main content + 300-360px fixed side rail" page layouts). Below,
     the sidebar becomes a slide-out drawer and the fixed-width rails stack
     under their main content instead of squeezing it. Nothing here changes
     anything at desktop widths. */
  .cc-hamburger { display: none; }
  @media (max-width: 900px) {
    .cc-split { grid-template-columns: 1fr !important; overflow: visible !important; }
    .cc-split > aside { border-left: none !important; border-top: 1px solid var(--cc-split-line, rgba(128,128,128,.25)); }
    /* stacked to one column, the match source card no longer has a second
       column scrolling past it, so "stays pinned at the top" just means it
       overlaps whatever scrolls underneath it instead */
    .cc-match-source { position: static !important; }
  }
  @media (max-width: 820px) {
    .cc-sidebar {
      position: fixed !important; top: 0; left: 0; bottom: 0; z-index: 300;
      width: min(84vw, 280px) !important; min-width: min(84vw, 280px) !important;
      transform: translateX(-100%); transition: transform .22s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .cc-sidebar-open { transform: translateX(0); }
    .cc-nav-backdrop { position: fixed; inset: 0; z-index: 290; background: rgba(0,0,0,.4); }
    .cc-collapse-btn { display: none !important; }
    .cc-hamburger { display: flex !important; }
    .cc-header { padding: 14px 16px !important; gap: 10px !important; flex-wrap: wrap !important; }
    .cc-header-title { flex: 1 1 auto; min-width: 0; }
    .cc-header-spacer { display: none !important; }
    .cc-search { width: 100% !important; order: 3; }
  }
  @media (max-width: 600px) {
    /* the family legend is an absolutely-positioned overlay pinned to the
       bottom of the stage; give the centered wheel extra bottom padding so
       it visually clears the legend row instead of running through it. */
    .cc-stage { padding-bottom: 110px !important; }
  }
  @media (max-width: 480px) {
    /* the Color Theory harmony wheel has HTML overlay chips positioned by
       JS using the wheel's own pixel coordinate space, so it can't just be
       told width:100% like the plain hue wheel (the overlays would drift
       out of alignment); scaling the whole wrapper as one unit keeps every
       chip lined up with the ring it belongs to. */
    .cc-ct-scale { width: 280px !important; height: 280px !important; }
    .cc-ct-scale .cc-ct-orbit { transform: scale(.7071); transform-origin: top left; }
    .cc-ct-palette { width: 280px !important; }
  }

</style>
